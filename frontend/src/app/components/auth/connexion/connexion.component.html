<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8">
    
    <!-- En-tête -->
    <div class="text-center">
      <h2 class="text-4xl font-extrabold text-gray-900">
        City Mall
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Connectez-vous à votre compte
      </p>
    </div>

    <!-- Formulaire de connexion -->
    <div class="bg-white rounded-lg shadow-xl p-8">
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        
        <!-- Message d'erreur -->
        <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
          <div class="flex">
            <div class="flex-shrink-0">
              <i class="fas fa-exclamation-circle text-red-500"></i>
            </div>
            <div class="ml-3">
              <p class="text-sm text-red-700">{{ errorMessage }}</p>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            Adresse email
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-envelope text-gray-400"></i>
            </div>
            <input
              id="email"
              name="email"
              type="email"
              [(ngModel)]="credentials.email"
              required
              class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="votreemail@exemple.com"
            />
          </div>
        </div>

        <!-- Mot de passe -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Mot de passe
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="credentials.motDePasse"
              required
              class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="••••••••"
            />
          </div>
        </div>

        <!-- Bouton de connexion -->
        <div>
          <button
            type="submit"
            [disabled]="loading"
            class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition"
          >
            <i *ngIf="loading" class="fas fa-spinner fa-spin mr-2"></i>
            <span *ngIf="!loading">Se connecter</span>
            <span *ngIf="loading">Connexion en cours...</span>
          </button>
        </div>

        <!-- Lien vers inscription -->
        <div class="text-center">
          <p class="text-sm text-gray-600">
            Pas encore de compte ?
            <a 
              routerLink="/inscription" 
              class="font-medium text-blue-600 hover:text-blue-500 transition"
            >
              Créer un compte
            </a>
          </p>
        </div>
      </form>

      <!-- Séparateur -->
      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">Comptes de démonstration</span>
          </div>
        </div>

        <!-- Boutons de démo -->
        <div class="mt-6 grid grid-cols-3 gap-3">
          <button
            type="button"
            (click)="fillDemo('admin')"
            class="inline-flex justify-center items-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-xs font-medium text-gray-700 hover:bg-gray-50 transition"
          >
            <i class="fas fa-user-shield mr-1 text-red-500"></i>
            Admin
          </button>

          <button
            type="button"
            (click)="fillDemo('boutique')"
            class="inline-flex justify-center items-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-xs font-medium text-gray-700 hover:bg-gray-50 transition"
          >
            <i class="fas fa-store mr-1 text-green-500"></i>
            Boutique
          </button>

          <button
            type="button"
            (click)="fillDemo('client')"
            class="inline-flex justify-center items-center py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white text-xs font-medium text-gray-700 hover:bg-gray-50 transition"
          >
            <i class="fas fa-user mr-1 text-blue-500"></i>
            Client
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-500">
      © 2026 City Mall - RATONANDRASANA Aina Ny Antsa - RAHERIMALALA FANOMEZANTSOA Nirina Nantenaina - Tous droits réservés
    </p>
  </div>
</div>
