<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 py-12 px-4">

  <div class="max-w-md w-full">

    <!-- Card principal -->
    <div class="bg-white/90 backdrop-blur rounded-2xl shadow-2xl p-8 border border-gray-100">

      <!-- Header avec logo -->
      <div class="text-center mb-8">
        <img 
          src="logos/logo-lacity-mall.png" 
          alt="Logo"
          class="mx-auto h-20 w-auto mb-6 drop-shadow-sm"
        />
        <p class="text-gray-600 text-sm">
          Connectez-vous pour accéder à votre espace
        </p>
      </div>

      <!-- Formulaire -->
      <form class="space-y-6" (ngSubmit)="onSubmit()">

        <!-- Message d'erreur -->
        <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm">
          <i class="fas fa-exclamation-circle mr-2"></i>
          {{ errorMessage }}
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse email</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3 top-3.5 text-gray-400"></i>
            <input
              type="email"
              name="email"
              [(ngModel)]="credentials.email"
              required
              placeholder="votreemail@exemple.com"
              class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            />
          </div>
        </div>

        <!-- Mot de passe -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Mot de passe</label>
        <div class="relative">
          <!-- Icône verrou à gauche -->
          <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">
            <i class="fas fa-lock"></i>
          </span>

          <!-- Input -->
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="credentials.motDePasse"
            required
            placeholder="••••••••"
            class="w-full pl-10 pr-10 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          />

          <!-- Bouton œil à droite -->
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
          >
            <i [ngClass]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
      </div>


        <!-- Bouton connexion -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 rounded-lg font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition shadow-lg disabled:opacity-50"
        >
          <i *ngIf="loading" class="fas fa-spinner fa-spin mr-2"></i>
          {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
        </button>

        <!-- Lien inscription -->
        <p class="text-center text-sm text-gray-600">
          Pas encore de compte ?
          <a routerLink="/inscription" class="text-blue-600 font-semibold hover:underline">
            Créer un compte
          </a>
        </p>

      </form>

      <!-- Séparateur -->
      <div class="my-8 border-t"></div>

      <!-- Comptes de démonstration -->
      <div class="text-center mb-4 text-sm text-gray-500">Comptes de démonstration</div>

      <div class="grid grid-cols-3 gap-3">
        <button type="button" (click)="fillDemo('admin')" class="demo-btn">
          <i class="fas fa-user-shield text-red-500"></i> Admin
        </button>
        <button type="button" (click)="fillDemo('boutique')" class="demo-btn">
          <i class="fas fa-store text-green-500"></i> Boutique
        </button>
        <button type="button" (click)="fillDemo('client')" class="demo-btn">
          <i class="fas fa-user text-blue-500"></i> Client
        </button>
      </div>

    </div>

    <!-- Footer  -->
    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 — RATOVONANDRASANA Aina Ny Antsa - RAHERIMALALA FANOMEZANTSOA Nirina Nantenaina - Tous droits réservés
    </p>

  </div>
</div>
