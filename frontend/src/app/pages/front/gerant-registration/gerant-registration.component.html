<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 py-12 px-4">

  <div *ngIf="loadingBoutique" class="text-center">
    <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
    <p class="text-gray-600">Chargement...</p>
  </div>

  <div *ngIf="!loadingBoutique && boutique" class="max-w-md w-full">
    <div class="bg-white/90 backdrop-blur rounded-2xl shadow-2xl p-8 border border-gray-100">

      <div class="text-center mb-8">
        <img
          src="logos/logo-lacity-mall.png"
          alt="Logo"
          class="mx-auto h-20 w-auto mb-6 drop-shadow-sm"
        />
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Créer votre mot de passe</h2>
        <p class="text-gray-600 text-sm">
          Boutique : <strong>{{ boutique.nom }}</strong>
        </p>
      </div>

      <form class="space-y-6" (ngSubmit)="onSubmit()">

        <!-- Nouveau mot de passe -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Nouveau mot de passe</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              name="motDePasse"
              [(ngModel)]="motDePasse"
              required
              minlength="6"
              placeholder="••••••••"
              class="w-full pl-10 pr-10 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
            >
              <i [ngClass]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
          <p class="text-xs text-gray-500 mt-1">Minimum 6 caractères</p>
        </div>

        <!-- Confirmation mot de passe -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Confirmer le mot de passe</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
            <input
              [type]="showConfirmation ? 'text' : 'password'"
              name="confirmation"
              [(ngModel)]="confirmation"
              required
              minlength="6"
              placeholder="••••••••"
              class="w-full pl-10 pr-10 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            />
            <button
              type="button"
              (click)="showConfirmation = !showConfirmation"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 focus:outline-none"
            >
              <i [ngClass]="showConfirmation ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Bouton submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3 rounded-lg font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition shadow-lg disabled:opacity-50"
        >
          <i *ngIf="loading" class="fas fa-spinner fa-spin mr-2"></i>
          {{ loading ? 'Création...' : 'Validation de mon Compte' }}
        </button>

        <!-- Lien retour connexion -->
        <div class="text-center">
          <a routerLink="/connexion" class="text-sm text-gray-600 hover:text-blue-600 transition">
            <i class="fas fa-arrow-left mr-2"></i>
            Retour à la connexion
          </a>
        </div>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 — RATOVONANDRASANA Aina Ny Antsa - RAHERIMALALA FANOMEZANTSOA Nirina Nantenaina - Tous droits réservés
    </p>
  </div>
</div>
